version: 2

sources:
  - name: landing
    database: "{{ target.database }}"
    schema: landing
    description: "Snowflake landing schema for the raw data."
    tables:
      - name: btc
        description: "Landing schema table for bitcoin raw data."
        config:
          loaded_at_field: block_timestamp
          freshness:
            warn_after: {count: 1, period: hour}
            #error_after: {count: 1, period: hour}
        columns:
          - name: hash_key
            description: "Unique identifier for each bitcoin record. The hash of this transaction."
            tests:
              - unique
              - not_null
          - name: block_hash
            description: "Hash of the block containing the bitcoin transaction."
          - name: block_number
            description: "Number of the block containing the bitcoin transaction."
          - name: block_timestamp
            description: "Timestamp of the block containing the bitcoin transaction."
          - name: fee
            description: "Transaction fee for the bitcoin transaction."
          - name: input_value
            description: "Input value of the bitcoin transaction."
          - name: output_btc
            description: "Output value of the bitcoin transaction."
          - name: fee_per_byte
            description: "Transaction fee per byte for the bitcoin transaction."
          - name: is_coinbase
            description: "True if this transaction is a coinbase transaction."
          - name: outputs
            description: "Transaction outputs for the bitcoin transaction."