name: Snowflake dbt DEV CI

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: read

concurrency:
  group: snowflake-dbt-dev-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  ci-deploy-dev:
    name: Validate dbt project in DEV
    runs-on: ubuntu-latest
    environment: DEV

    env:
      DBT_PROFILES_DIR: /home/runner/.dbt
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE_DEV: ${{ secrets.SNOWFLAKE_DATABASE_DEV }}
      SNOWFLAKE_PRIVATE_KEY_B64: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_B64 }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt packages
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.11 dbt-snowflake==1.11.2

      - name: Configure dbt profile and Snowflake private key
        run: |
          mkdir -p ~/.dbt
          printf '%s' "$SNOWFLAKE_PRIVATE_KEY_B64" | base64 -d > ~/.dbt/rsa_key.p8
          chmod 600 ~/.dbt/rsa_key.p8

          cat > ~/.dbt/profiles.yml <<EOF
          snowflake_dbt_analytics:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: "$SNOWFLAKE_ACCOUNT"
                user: "$SNOWFLAKE_USER"
                role: "$SNOWFLAKE_ROLE"
                warehouse: "$SNOWFLAKE_WAREHOUSE"
                database: "$SNOWFLAKE_DATABASE_DEV"
                schema: STAGING
                threads: 1
                private_key_path: /home/runner/.dbt/rsa_key.p8
          EOF

      - name: Install dbt dependencies
        working-directory: snowflake_dbt_analytics
        run: dbt deps

      - name: Validate dbt connection
        working-directory: snowflake_dbt_analytics
        run: dbt debug --target dev

      - name: Deploy to DEV
        working-directory: snowflake_dbt_analytics
        run: dbt build --target dev

      - name: Run dbt tests in DEV
        working-directory: snowflake_dbt_analytics
        run: dbt test --target dev
